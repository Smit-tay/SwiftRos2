services:
  swiftpro_ros:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - HOST_UID=${UID:-1000}
        - HOST_GID=${GID:-1000}
        - USERNAME=${USER:-$(id -un)}
    container_name: swiftpro_ros
    network_mode: "host"
    privileged: true
    userns_mode: "keep-id"
    command: /bin/bash
    tty: true
    stdin_open: true
    volumes:
      - /home/jack/dev/smithjack.net/SwiftRos2:/swiftros_ws
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      QT_X11_NO_MITSHM: 1
      DISPLAY: $DISPLAY
    cap_add:
      - SYS_NICE
