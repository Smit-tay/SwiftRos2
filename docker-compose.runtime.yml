services:
  swiftros2_hardware:
    image: localhost:5000/swiftros2_runtime:latest
    container_name: swiftros2_hardware
    network_mode: "host"
    privileged: true
    volumes:
      - /opt/swiftros2:/opt/swiftros2:z
      - /dev:/dev
    environment:
      ROS_DOMAIN_ID: 11
      SWIFTPRO_PORT: /dev/ttyACM0
    entrypoint: ["/opt/swiftros2/entrypoint.sh"]
    restart: unless-stopped
    
